services:
  user-service:
    build: ./node/user-service
    container_name: user-service
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    ports:
      - "3000:3000"

  order-service:
    build: ./node/orders-service
    container_name: order-service
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      USER_SERVICE_URL: http://user-service:3000
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
    ports:
      - "3001:3001"
    depends_on:
      - user-service
      - notification-service

  notification-service:
    build: ./node/notifications-service
    container_name: notification-service
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      DELIVERY_SERVICE_URL: http://delivery-service:3003
    ports:
      - "3002:3002"
    depends_on:
      - delivery-service

  delivery-service:
    build: ./node/delivery-service
    container_name: delivery-service
    environment:
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    ports:
      - "3003:3003"